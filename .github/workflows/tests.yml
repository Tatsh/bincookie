---
jobs:
  build:
    env:
      COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: ubuntu-latest
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
        with:
          persist-credentials: false
      - name: Install tools
        run: pipx install cpp-coveralls && sudo apt-get update -y && sudo apt-get install -y doxygen graphviz lcov ninja-build
      - name: Configure
        run: cmake -G Ninja -B ${{github.workspace}}/build -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_VERBOSE_MAKEFILE=ON -DWITH_DOCS=ON -DWITH_TESTS=ON -DWITH_EXAMPLES=ON --install-prefix ${{github.workspace}}/build/prefix
      - name: Build
        run: cmake --build ${{github.workspace}}/build
      - name: Install
        run: cmake --install ${{github.workspace}}/build
      - name: Run tests
        run: ctest --test-dir ${{github.workspace}}/build
      - name: Generate coverage information
        run: >-
          lcov -c -d ${{github.workspace}}/build -o coverage1.lcov
          --include bincookie.h
          --keep-going
      - name: Coveralls
        uses: 'coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e'
name: Tests
'on':
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
permissions:
  contents: read
