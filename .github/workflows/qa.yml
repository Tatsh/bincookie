jobs:
  changes:
    outputs:
      cpp: '${{ steps.filter.outputs.cpp }}'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v6'
      - id: 'filter'
        uses: 'dorny/paths-filter@v4'
        with:
          filters: |
            cpp:
              - '**/*.c'
              - '**/*.cpp'
              - '**/*.h'
              - '**/*.hpp'
  qa:
    needs: 'changes'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v6'
      - name: 'Yarn cache'
        uses: 'actions/cache@v5'
        with:
          key: "${{ runner.os }}-yarn-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}"
          path: '~/.yarn/berry'
          restore-keys: '${ runner.os }}-yarn'
      - name: 'Install dependencies (Yarn)'
        run: 'yarn'
      - continue-on-error: true
        id: 'clang-format'
        if: "needs.changes.outputs.cpp == 'true'"
        name: 'Check formatting (clang-format)'
        run: 'clang-format -n src/*.cpp src/*.h'
      - continue-on-error: true
        id: 'prettier'
        name: 'Check formatting (Prettier)'
        run: 'yarn prettier -c .'
      - continue-on-error: true
        id: 'markdownlint'
        name: 'Check formatting (markdownlint)'
        run: 'yarn markdownlint-cli2 --config package.json --configPointer /markdownlint-cli2'
      - continue-on-error: true
        id: 'spelling'
        name: 'Check spelling'
        run: 'yarn check-spelling'
      - if: 'always()'
        name: 'Check results'
        run: |
          ([ "${{ needs.changes.outputs.cpp }}" != "true" ] || [ "${{ steps.clang-format.outcome }}" = "success" ]) &&
          [ "${{ steps.prettier.outcome }}" = "success" ] &&
          [ "${{ steps.markdownlint.outcome }}" = "success" ] &&
          [ "${{ steps.spelling.outcome }}" = "success" ]
name: 'QA'
'on':
  pull_request:
    branches:
      - 'master'
  push:
    branches:
      - 'master'
permissions:
  contents: 'read'
