---
jobs:
  analyze:
    name: 'Analyze (${{ matrix.language }})'
    permissions:
      actions: read
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
        with:
          persist-credentials: false
      - if: matrix.language == 'c-cpp'
        name: Install Ninja
        run: sudo apt-get update -y && sudo apt-get install -y ninja-build
      - if: matrix.language == 'c-cpp'
        name: Configure
        run: cmake -G Ninja -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake -DWITH_EXAMPLES=ON -DWITH_TESTS=ON -B ${{github.workspace}}/build
      - name: Initialize CodeQL
        uses: 'github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a'
        with:
          build-mode: ${{ matrix.build-mode }}
          languages: ${{ matrix.language }}
      - if: matrix.language == 'c-cpp'
        name: Build
        run: cmake --build ${{github.workspace}}/build
      - name: Perform CodeQL Analysis
        uses: 'github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a'
        with:
          category: '/language:${{ matrix.language }}'
    strategy:
      fail-fast: false
      matrix:
        include:
          - build-mode: none
            language: actions
          - build-mode: manual
            language: c-cpp
name: CodeQL
'on':
  pull_request:
    branches: ['master']
  push:
    branches: ['master']
  schedule:
    - cron: 19 1 * * 1
